<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compartilha Link</title>
    <link rel="stylesheet" href="./styles.css?v=2" />
    <script src="./config.js"></script>
    <script src="./app.js?v=15" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div class="brandBlock">
            <h1>Compartilha Link</h1>
          </div>
          <button id="logoutButton" class="ghostButton hidden" type="button">Sair</button>
        </header>

        <section id="loginPanel" class="loginPanel">
          <h1 class="loginTitle">Compartilha Link</h1>
          <button id="loginButton" class="primaryButton loginButton" type="button">Login</button>
          <p class="loginNote">Acesso permitido apenas com conta corporativa do dominio @santacasaandradina.org.</p>
          <p id="loginStatus" class="status"></p>
        </section>

        <section id="appPanel" class="grid hidden">
          <div class="panel">
            <div class="accountLine">
              <span>Conectado como</span>
              <strong id="accountName">-</strong>
            </div>

            <label class="field">
              <span>Nome da pasta:</span>
              <input id="sectorInput" value="Geral" placeholder="Ex.: Prontuario, Prestacao de Contas" />
            </label>

            <label class="dropzone">
              <strong>Selecionar ou arrastar arquivos</strong>
              <span>Tambem aceita pastas arrastadas para este campo</span>
              <input id="fileInput" type="file" multiple />
            </label>

            <label class="folderPicker">
              Selecionar pasta inteira
              <input id="folderInput" type="file" webkitdirectory directory multiple />
            </label>

            <div id="fileSummary" class="fileSummary hidden">
              <div>
                <strong id="fileCount">0 arquivo(s)</strong>
                <span id="fileSize">0 B no total</span>
              </div>
              <button id="clearButton" class="iconButton" type="button" aria-label="Limpar arquivos">X</button>
            </div>

            <div id="fileList" class="fileList"></div>

            <button id="uploadButton" class="primaryButton" type="button" disabled>
              Enviar e gerar links
            </button>

            <p id="statusMessage" class="status"></p>
          </div>

          <div class="panel resultsPanel">
            <div class="panelHeader">
              <h2>Links gerados</h2>
              <span id="linkCount">0</span>
            </div>
            <div id="emptyState" class="emptyState">
              <span class="clipboardIcon">LK</span>
              <p>Os links aparecem aqui assim que o envio terminar.</p>
            </div>
            <div id="linkList" class="linkList"></div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
